<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordered List</title>
</head>
<body>
    <h1>How to make a Tea☕</h1>
    <ol type="1">
        <li>Boil water</li>
        <li>Add tea leaves to the boiling water</li>
        <li>Let it simmer for a few minutes</li>
        <li>Strain the tea into a cup</li>
        <li>Add sugar and milk as per your taste</li>
        <li>Stir well and enjoy your tea! </li>
    </ol>
</body>
</html>
