<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="email">Email: </label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <br>
        <label for="age">Age: </label>
        <input type="number" id="age" name="age" placeholder="Enter your age"  min="1" max="10" required>
        <br>
        <label for="password">Password: </label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <br>
        <label for="date">Date of Birth: </label>
        <input type="date" name="date" id="date" required>
        <br>
        <label for="time">Preferred Time: </label>
        <input type="time" name="time" id="time" required>
        <br>
        <label for="resume">Upload Resume: </label>
        <input type="file" name="resume" id="resume" required>
        <br>
        <label for="experience">Experience: </label>
        <input type="range">
        <br>
        <label for="gender">Gender: </label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <input type="radio" name="gender">Other
        <!-- <select name="gender" id="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select> -->
        <br>
        <label for="gender">Hobbies: </label>
        <input type="checkbox" name="gender">Killing🔪
        <input type="checkbox" name="gender">Boxing🥊
        <input type="checkbox" name="gender">Fighting🥷
        <br>
        <input type="submit" value="Submit">

    </form>
</body>
</html>
