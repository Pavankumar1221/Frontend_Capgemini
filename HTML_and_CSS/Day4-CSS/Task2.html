<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple UI</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        .circle {
            width: 200px;
            height: 200px;
            background-color: green;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
        }

        .circle span {
            font-size: 60px;
        }

        .text {
            margin-top: 20px;
            font-size: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="circle">
            <span>😎</span>
        </div>
        <div class="text">Hii..</div>
    </div>

</body>
</html>
