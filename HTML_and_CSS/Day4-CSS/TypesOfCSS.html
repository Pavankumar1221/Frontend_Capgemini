<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="externalcss1.css">
    <style>
        * {
            font-family: 'Times New Roman', Times, serif;
        }
        #internalcss {
            color: green;
            background-color: lightyellow;
        }
        h2::first-letter {
            color: red;
            font-size: 200%;
        }
    </style>
</head>
<body>
    <h1 style="color: blue; background-color: beige;">This is Inline CSS</h1>

    <h1 id="internalcss">This is Internal CSS</h1>

    <h2>This is a Heading</h2>

    <!-- External CSS -->
     <dl>
        <dt>LPU</dt>
        <dd> Lovely Professional University</dd>
     </dl>
     <br><br>

     <!-- Task-2 -->

     <fieldset>
        <legend>Personal Information</legend>
        <label for="name">Name:</label>
        <input type="text" id="name"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email"><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password"><br><br>
        <label for="confirm_password">Confirm Password:</label>
        <input type="password" id="confirm_password"><br><br>
        <input type="submit" value="Register">
     </fieldset>
     <br><br>


    <!-- Task -->
     <div style="border: 1 solid black; padding: 10px; margin: 10px; background-color: lightblue; width: 300px; height: 300px;">
         <h2>Registration Form</h2>
        <table>
            <tr>
                <td><label for="name">Name:</label></td>
                <td><input type="text" id="name"></td>
            </tr>
            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email"></td>
            </tr>
            <tr>
                <td><label for="password">Password:</label></td>
                <td><input type="password" id="password"></td>
            </tr>
            <tr>
                <td><label for="phone">Phone:</label></td>
                <td><input type="number" id="phone"></td>
            </tr>
            <tr>
                <td><label for="state">State:</label></td>
                <td><input type="text" id="state"></td>
            </tr>
            <tr>
                <td colspan="2"><input type="submit" value="submit" style="text-align: center;"></td>
            </tr>
        </table>
     </div>
</body>
</html>
