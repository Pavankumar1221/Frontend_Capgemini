<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Form</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="container">
    <h2>Contact Us</h2>

    <div class="row">
      <div class="input-group">
        <label>First Name *</label>
        <input type="text">
      </div>

      <div class="input-group">
        <label>Last Name *</label>
        <input type="text">
      </div>
    </div>

    <div class="input-group">
      <label>Email Address *</label>
      <input type="email">
    </div>

    <div class="input-group">Query Type *</div>

    <div class="row">
      <div class="radio-box">
        <input type="radio" name="query">
        <label>General Enquiry</label>
      </div>

      <div class="radio-box">
        <input type="radio" name="query">
        <label>Support Request</label>
      </div>
    </div>

    <div class="input-group">
      <label>Message *</label>
      <textarea rows="4"></textarea>
    </div>

    <div class="checkbox">
      <input type="checkbox">
      <label>I consent to being contacted by the team *</label>
    </div>

    <button>Submit</button>
  </div>

</body>
</html>
