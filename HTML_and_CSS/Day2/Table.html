<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            text-emphasis: center;
            border-collapse: collapse;
        }
        th {
            background-color: lightgray;
        }
        td {
            text-align: center;
        }
    </style>
</head>
<body>
    <table border="2"  >
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>Pavan</td>
            <td>21</td>
            <td>Srikakulam</td>
        </tr>
        <tr>
            <td>Madhav</td>
            <td>60</td>
            <td>Vijayawada</td>
        </tr>
        <tr>
            <td>Krishna</td>
            <td>101</td>
            <td>Hyderabad</td>
        </tr>
        <tfoot>
            <tr>
                <td colspan="3">This is the footer of the table</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
