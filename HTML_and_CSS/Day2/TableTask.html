<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            text-emphasis: center;
            border-collapse: collapse;
        }
        th {
            background-color: lightgray;
        }
        td {
            text-align: center;
        }
        
       
    </style>
</head>
<body>
    <table border="1"  >
        <tr>
            <th rowspan="2"></th>
            <th colspan="2">Average</th>
            <th rowspan="2">Red eyes</th>
        </tr>
        <tr>
            <th>Height</th>
            <th>Weight</th>
        </tr>
        <tr>
            <td>Male</td>
            <td>2.5</td>
            <td>0.003</td>
            <td>40%</td>
        </tr>
        <tr>
            <td>Female</td>
            <td>1.2</td>
            <td>0.002</td>
            <td>30%</td>
        </tr>
    </table>
</body>
</html>
