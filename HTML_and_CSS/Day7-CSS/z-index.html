<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: 'Times New Roman', Times, serif;
        }

        .box1{
            border: 2px solid black;
            border-radius: 10px;
            width: 200px;
            height: 200px;
            background-color: rgb(244, 172, 244);
            position: absolute;
            z-index: 1;
            top: 20px;
            left: 20px;
        }
        .box2{
            border: 2px solid black;
            border-radius: 10px;
            width: 200px;
            height: 200px;
            background-color: rgb(202, 255, 202);
            position: absolute;
            z-index: 2;
            top: 60px;
            left: 40px;
        }
        .box3{
            border: 2px solid black;
            border-radius: 10px;
            width: 200px;
            height: 200px;
            background-color: rgb(202, 202, 255);
            position: absolute;
            z-index: 3;
            top: 100px;
            left: 60px;
        }


    </style>
</head>
<body>
    <div class="box1">
        <h2><i>Box 1</i></h2>
    </div>
    <div class="box2">
        <h2><i>Box 2</i></h2>
    </div>
    <div class="box3">
        <h2><i>Box 3</i></h2>
    </div>
</body>
</html>
