<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form UI</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    
    <div class="maincontainer">

        <div class="sidebar">

            <div class="steps">
                <p>1</p>
                <div>
                    STEP 1 <br>
                    YOUR INFO
                </div>
            </div>

            <div class="steps">
                <p>2</p>
                <div>
                    STEP 2 <br>
                    SELECT PLAN
                </div>
            </div>

            <div class="steps">
                <p>3</p>
                <div>
                    STEP 3 <br>
                    ADD-ONS
                </div>
            </div>

            <div class="steps">
                <p>4</p>
                <div>
                    STEP 4 <br>
                    SUMMARY
                </div>
            </div>

        </div>

        <div class="content">

            <h1>Personal Info</h1>
            <p>Please provide your name, email address, and phone number.</p>

            <label>Name</label><br>
            <input type="text" placeholder="e.g. Pavan Kumar"><br><br>

            <label>Email Address</label><br>
            <input type="email" placeholder="e.g. pavankumar@gmail.com"><br><br>

            <label>Phone Number</label><br>
            <input type="text" placeholder="e.g. +91 9635821473"><br><br>

            <button>Next Step</button>

        </div>

    </div>

</body>
</html>
